<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grandparent Kiosk Clock</title>
    <style>
        /* High-contrast, OLED/Battery-friendly dark theme */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0A0A0A;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .clock-container {
            text-align: center;
            width: 100%;
            padding: 20px;
        }

        .date-display {
            color: #888888;
            font-size: 3.5vw; /* Scales dynamically based on screen width */
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .time-display {
            color: #FFFFFF;
            font-size: 15vw; /* Massive, ultra-readable display */
            font-weight: 900;
            line-height: 1;
        }

        /* Subtle hint at the bottom for them */
        .status-display {
            color: #333333;
            font-size: 1.8vw;
            font-weight: 500;
            margin-top: 40px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div id="date" class="date-display">Loading Date...</div>
        <div id="time" class="time-display">00:00 AM</div>
        <div class="status-display">KIOSK CLOCK ACTIVE</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            // 1. Format the Date (e.g., "SUNDAY, MAY 24")
            const dateOptions = { weekday: 'long', month: 'long', day: 'numeric' };
            const dateString = now.toLocaleDateString('en-US', dateOptions);
            document.getElementById('date').innerText = dateString;

            // 2. Format the Time (e.g., "07:05 PM")
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12; // Convert '0' to '12'
            const hoursString = String(hours).padStart(2, '0');

            document.getElementById('time').innerText = `${hoursString}:${minutes} ${ampm}`;
        }

        // Run immediately on load, then update every single second
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
